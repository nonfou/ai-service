server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ai-api-platform
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:${DB_PATH:/app/data/ai_api_platform.db}
    hikari:
      minimum-idle: 1
      maximum-pool-size: 4
      connection-timeout: 20000
      pool-name: HikariPool-AIService-Prod

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:604800000}
  issuer: ${JWT_ISSUER:prod}

system-config:
  cache-ttl-seconds: ${SYSTEM_CONFIG_CACHE_TTL:60}

admin:
  security:
    enable-ip-whitelist: ${ADMIN_ENABLE_IP_WHITELIST:false}
    ip-whitelist: ${ADMIN_IP_WHITELIST:}
    enable-rate-limit: true
    rate-limit: ${ADMIN_RATE_LIMIT:60}
    enable-login-lock: true
    max-login-attempts: ${ADMIN_MAX_LOGIN_ATTEMPTS:5}
    lock-duration: ${ADMIN_LOCK_DURATION:30}

encryption:
  key: ${ENCRYPTION_KEY}
  iv: ${ENCRYPTION_IV:}

rate-limit:
  enabled: ${RATE_LIMIT_ENABLED:true}
  requests-per-minute: ${RATE_LIMIT_RPM:60}
  api-requests-per-minute: ${RATE_LIMIT_API_RPM:30}

http:
  pool:
    max-total: ${HTTP_POOL_MAX_TOTAL:200}
    max-per-route: ${HTTP_POOL_MAX_PER_ROUTE:50}
    validate-after-inactivity-ms: ${HTTP_POOL_VALIDATE_AFTER_INACTIVITY_MS:2000}

backend:
  client:
    models:
      enabled: ${CLIENT_MODEL_ALIAS_ENABLED:true}
      aliases:
        claude-sonnet-4-5: claude-sonnet-4.5
        claude-sonnet-4.5: claude-sonnet-4.5
        claude-sonnect-4-5: claude-sonnet-4.5
        claude-sonnect-4.5: claude-sonnet-4.5
        claude-4.5-sonnet: claude-sonnet-4.5
        claude-haiku-4-5: claude-haiku-4.5
        claude-haiku-4.5: claude-haiku-4.5
        claude-4.5-haiku: claude-haiku-4.5
        gpt-5-1: gpt-5.1
        gpt5.1: gpt-5.1
        gpt-5-1-codex: gpt-5.1-codex
        gpt-5-1-codex-mini: gpt-5.1-codex-mini
        gemini-2-5-pro: gemini-2.5-pro
        gemini-3-0-pro: gemini-3-pro
  streaming:
    timeout-ms: ${BACKEND_STREAM_TIMEOUT_MS:300000}
    core-pool-size: ${BACKEND_STREAM_CORE_POOL:8}
    max-pool-size: ${BACKEND_STREAM_MAX_POOL:32}
    queue-capacity: ${BACKEND_STREAM_QUEUE:500}
    keep-alive-seconds: ${BACKEND_STREAM_KEEP_ALIVE:60}
  copilot:
    proxy:
      base-url: ${COPILOT_PROXY_BASE_URL:}
      api-key: ${COPILOT_PROXY_API_KEY:}
      connect-timeout-ms: ${COPILOT_PROXY_CONNECT_TIMEOUT_MS:10000}
      read-timeout-ms: ${COPILOT_PROXY_READ_TIMEOUT_MS:600000}
      stream-timeout-ms: ${COPILOT_PROXY_STREAM_TIMEOUT_MS:1800000}

logging:
  level:
    root: WARN
    com.nonfou.github: INFO
    org.springframework: WARN
    org.mybatis: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/application.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
