server:
  port: 8080

spring:
  application:
    name: ai-api-platform
  profiles:
    active: dev

  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/ai_api_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  # 邮件配置
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: ${MAIL_SSL_ENABLE:false}
            protocols: TLSv1.2
          socketFactory:
            class: ${MAIL_SOCKET_FACTORY_CLASS:}
            port: ${MAIL_PORT:587}
            fallback: false
          starttls:
            enable: ${MAIL_STARTTLS_ENABLE:true}
            required: ${MAIL_STARTTLS_REQUIRED:true}
          timeout: 5000
          connectiontimeout: 5000

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.nonfou.github.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: ${JWT_SECRET:0Qu/3sEdrbX+2BmxsMeahKQYlZpbhdArOCBY2FXFYRo=}
  expiration: ${JWT_EXPIRATION:604800000}  # 7天（毫秒）

# 支付宝配置
alipay:
  app-id: ${ALIPAY_APP_ID:}  # 支付宝应用ID
  private-key: ${ALIPAY_PRIVATE_KEY:}  # 商户私钥
  public-key: ${ALIPAY_PUBLIC_KEY:}  # 支付宝公钥
  gateway-url: ${ALIPAY_GATEWAY_URL:https://openapi.alipaydev.com/gateway.do}  # 沙箱环境,生产环境改为 https://openapi.alipay.com/gateway.do
  notify-url: ${ALIPAY_NOTIFY_URL:http://yourdomain.com/api/recharge/alipay/notify}  # 异步通知地址
  return-url: ${ALIPAY_RETURN_URL:http://yourdomain.com/wallet}  # 同步跳转地址
  sign-type: RSA2
  charset: UTF-8
  format: json

# 微信支付配置
wechat:
  app-id: ${WECHAT_APP_ID:}  # 微信应用ID
  mch-id: ${WECHAT_MCH_ID:}  # 商户号
  api-v3-key: ${WECHAT_API_V3_KEY:}  # APIv3密钥
  merchant-serial-number: ${WECHAT_MERCHANT_SERIAL_NUMBER:}  # 商户证书序列号
  private-key-path: ${WECHAT_PRIVATE_KEY_PATH:classpath:apiclient_key.pem}  # 商户私钥路径
  notify-url: ${WECHAT_NOTIFY_URL:http://yourdomain.com/api/recharge/wechat/notify}  # 异步通知地址

# 管理后台安全配置
admin:
  security:
    # IP白名单(不建议在IP不固定的情况下使用)
    enable-ip-whitelist: false
    ip-whitelist: []

    # 请求频率限制(推荐开启)
    enable-rate-limit: false  # 临时禁用以便开发测试
    rate-limit: 60  # 每分钟最大请求数

    # 登录失败锁定(推荐开启)
    enable-login-lock: false  # 临时禁用以便开发测试
    max-login-attempts: 5  # 最大失败次数
    lock-duration: 30  # 锁定时长(分钟)

# ====================================================
# 多账户中继服务配置
# ====================================================

# 加密配置
encryption:
  algorithm: AES/CBC/PKCS5Padding
  key: ${ENCRYPTION_KEY:your-32-character-encryption-key}  # 必须是32字符
  iv: ${ENCRYPTION_IV:your-16-char-iv}  # 必须是16字符

# 后端账户调度配置
backend:
  # 请求路由配置
  routing:
    # 默认提供商: copilot 或 openrouter
    default-provider: ${BACKEND_DEFAULT_PROVIDER:copilot}

  # Copilot 配置
  copilot:
    base-url: ${COPILOT_BASE_URL:https://api.githubcopilot.com}

  # 调度策略
  scheduler:
    # 策略类型: ROUND_ROBIN(轮询), LEAST_USED(最少使用), PRIORITY(优先级), HYBRID(混合), COST_OPTIMIZED(成本优先)
    strategy: ${BACKEND_SCHEDULER_STRATEGY:HYBRID}

    # 会话粘性配置
    session-stickiness:
      enabled: ${SESSION_STICKINESS_ENABLED:true}
      ttl-hours: ${SESSION_STICKINESS_TTL_HOURS:1}  # 会话绑定有效期（小时）
      renewal-on-request: ${SESSION_RENEWAL_ON_REQUEST:true}  # 每次请求是否续期

    # 健康检查配置
    health-check:
      enabled: ${HEALTH_CHECK_ENABLED:true}
      interval-seconds: ${HEALTH_CHECK_INTERVAL:30}  # 检查间隔（秒）
      timeout-seconds: ${HEALTH_CHECK_TIMEOUT:5}  # 超时时间（秒）
      failure-threshold: ${HEALTH_CHECK_FAILURE_THRESHOLD:3}  # 失败阈值（连续失败几次标记为不健康）
      success-threshold: ${HEALTH_CHECK_SUCCESS_THRESHOLD:2}  # 成功阈值（连续成功几次恢复健康）

    # 负载均衡配置
    load-balance:
      enable-concurrent-limit: ${LOAD_BALANCE_CONCURRENT_LIMIT:true}  # 启用并发限制
      enable-rate-limit: ${LOAD_BALANCE_RATE_LIMIT:true}  # 启用速率限制

  # 计费配置
  pricing:
    markup-rate: ${PRICING_MARKUP_RATE:1.2}  # 全局加成倍率（1.2 = 20%利润）
    enable-account-multiplier: ${PRICING_ENABLE_ACCOUNT_MULTIPLIER:true}  # 启用账户倍率
    enable-model-multiplier: ${PRICING_ENABLE_MODEL_MULTIPLIER:true}  # 启用模型倍率

  # 配额配置
  quota:
    default-daily-limit: ${QUOTA_DEFAULT_DAILY_LIMIT:100.00}  # 默认每日配额（元）
    default-monthly-limit: ${QUOTA_DEFAULT_MONTHLY_LIMIT:2000.00}  # 默认每月配额（元）
    enforce: ${QUOTA_ENFORCE:true}  # 是否强制执行配额限制
    alert-threshold: ${QUOTA_ALERT_THRESHOLD:80.0}  # 告警阈值（百分比）

  # OpenRouter 配置
  openrouter:
    base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
    fetch-realtime-pricing: ${OPENROUTER_FETCH_REALTIME_PRICING:true}  # 是否从 OpenRouter 获取实时价格
    # 可选：从配置文件加载账户（也可以从数据库管理）
    accounts:
      - name: ${OPENROUTER_ACCOUNT_1_NAME:openrouter-1}
        api-key: ${OPENROUTER_ACCOUNT_1_KEY:}
        priority: 1
        enabled: ${OPENROUTER_ACCOUNT_1_ENABLED:false}
      - name: ${OPENROUTER_ACCOUNT_2_NAME:openrouter-2}
        api-key: ${OPENROUTER_ACCOUNT_2_KEY:}
        priority: 2
        enabled: ${OPENROUTER_ACCOUNT_2_ENABLED:false}
