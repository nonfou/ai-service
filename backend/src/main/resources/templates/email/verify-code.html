<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- 验证码内容区域（将被插入到base-email.html中） -->
    <div>
        <!-- 标题 -->
        <h2 style="margin: 0 0 24px 0; color: #111827; font-size: 24px; font-weight: 600; line-height: 1.3;">
            邮箱验证码
        </h2>

        <!-- 问候语 -->
        <p style="margin: 0 0 20px 0; color: #4b5563; font-size: 15px; line-height: 1.6;">
            您好，
        </p>

        <!-- 说明文字 -->
        <p style="margin: 0 0 24px 0; color: #4b5563; font-size: 15px; line-height: 1.6;">
            您正在进行邮箱验证操作，您的验证码是：
        </p>

        <!-- 验证码展示区域 -->
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="margin: 0 0 24px 0;">
            <tr>
                <td style="text-align: center;">
                    <div style="display: inline-block; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; padding: 4px; box-shadow: 0 4px 12px rgba(102, 126, 234, 0.25);">
                        <div style="background-color: #ffffff; border-radius: 10px; padding: 20px 40px;">
                            <span th:text="${code}" style="font-size: 36px; font-weight: 700; letter-spacing: 8px; color: #667eea; font-family: 'Courier New', Courier, monospace;">
                                123456
                            </span>
                        </div>
                    </div>
                </td>
            </tr>
        </table>

        <!-- 提示信息 -->
        <div style="background-color: #fef3c7; border-left: 4px solid #f59e0b; padding: 16px 20px; border-radius: 8px; margin: 0 0 24px 0;">
            <p style="margin: 0 0 8px 0; color: #92400e; font-size: 14px; font-weight: 600;">
                重要提示
            </p>
            <ul style="margin: 0; padding-left: 20px; color: #92400e; font-size: 14px; line-height: 1.6;">
                <li style="margin-bottom: 6px;">验证码有效期为 <strong th:text="${expiryMinutes} + ' 分钟'">5 分钟</strong></li>
                <li style="margin-bottom: 6px;">请勿将验证码泄露给他人</li>
                <li>如果这不是您的操作，请忽略此邮件</li>
            </ul>
        </div>

        <!-- 额外说明 -->
        <p style="margin: 0; color: #6b7280; font-size: 14px; line-height: 1.6;">
            如果您没有请求此验证码，可能是他人误输入了您的邮箱地址，请忽略此邮件。您的账户安全不会受到影响。
        </p>
    </div>
</body>
</html>
