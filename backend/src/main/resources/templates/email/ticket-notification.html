<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- 工单通知内容区域（将被插入到base-email.html中） -->
    <div>
        <!-- 标题 -->
        <h2 style="margin: 0 0 8px 0; color: #111827; font-size: 24px; font-weight: 600; line-height: 1.3;" th:text="${subject}">
            工单通知
        </h2>

        <!-- 工单编号（如果有） -->
        <p th:if="${ticketId}" style="margin: 0 0 24px 0; color: #9ca3af; font-size: 13px;">
            工单编号: <span style="font-family: 'Courier New', Courier, monospace; color: #6b7280;" th:text="${ticketId}">#12345</span>
        </p>

        <!-- 分隔线 -->
        <div style="height: 1px; background: linear-gradient(to right, #e5e7eb 0%, transparent 100%); margin: 0 0 24px 0;"></div>

        <!-- 问候语 -->
        <p style="margin: 0 0 20px 0; color: #4b5563; font-size: 15px; line-height: 1.6;">
            您好，
        </p>

        <!-- 主要内容 -->
        <div style="background-color: #f9fafb; border-radius: 8px; padding: 20px; margin: 0 0 24px 0; border-left: 4px solid #667eea;">
            <div th:utext="${content}" style="color: #374151; font-size: 15px; line-height: 1.8; white-space: pre-wrap; word-wrap: break-word;">
                这里是工单的主要内容...
            </div>
        </div>

        <!-- 状态标签（如果有） -->
        <div th:if="${status}" style="margin: 0 0 24px 0;">
            <table role="presentation" cellspacing="0" cellpadding="0" border="0">
                <tr>
                    <td style="background-color: #dbeafe; color: #1e40af; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 500;">
                        状态: <span th:text="${status}">处理中</span>
                    </td>
                </tr>
            </table>
        </div>

        <!-- 操作按钮（如果有链接） -->
        <div th:if="${actionUrl}" style="margin: 32px 0 24px 0; text-align: center;">
            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                <tr>
                    <td style="text-align: center;">
                        <a th:href="${actionUrl}" href="#" style="display: inline-block; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #ffffff; text-decoration: none; padding: 14px 32px; border-radius: 8px; font-size: 15px; font-weight: 600; box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3); transition: all 0.3s ease;">
                            <span th:text="${actionText} ?: '查看详情'">查看详情</span>
                        </a>
                    </td>
                </tr>
            </table>
        </div>

        <!-- 提示信息 -->
        <div style="background-color: #eff6ff; border: 1px solid #bfdbfe; padding: 16px 20px; border-radius: 8px; margin: 0 0 24px 0;">
            <p style="margin: 0; color: #1e40af; font-size: 14px; line-height: 1.6;">
                <strong>温馨提示：</strong>您可以登录 xCoder 平台查看工单详情和历史记录。
            </p>
        </div>

        <!-- 额外说明 -->
        <p style="margin: 0; color: #6b7280; font-size: 14px; line-height: 1.6;">
            如有任何疑问，欢迎随时联系我们的客服团队。我们将竭诚为您服务。
        </p>
    </div>
</body>
</html>
