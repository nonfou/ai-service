# ====================================================
# 开发环境配置
# ====================================================

# 环境特定的配置值
# 数据库配置
spring:
  datasource:
    # 开发环境数据库 URL
    # useSSL=false: 本地开发无需 SSL
    # allowPublicKeyRetrieval=true: MySQL 8.0 需要
    # cachePrepStmts=true: 启用预编译语句缓存
    url: ${DB_URL:jdbc:mysql://localhost:3306/ai_api_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123}

    # 开发环境连接池配置 (相对宽松)
    hikari:
      minimum-idle: 3  # 开发环境可以更小
      maximum-pool-size: 10  # 开发环境不需要太多连接
      connection-timeout: 30000  # 开发环境可以更长
      leak-detection-threshold: 0  # 开发环境关闭泄漏检测(避免误报)

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # 邮件配置
  mail:
    host: ${MAIL_HOST:smtp.exmail.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:support@xcoder.plus}
    password: ${MAIL_PASSWORD:}  # ⚠️ 请设置环境变量 MAIL_PASSWORD
    properties:
      mail:
        smtp:
          ssl:
            enable: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
            port: 465
          starttls:
            enable: false
            required: false
  servlet:
    session:
          cookie:
            secure: false  # 开发环境使用HTTP,设为false

# MyBatis Plus 开发环境配置
mybatis-plus:
  configuration:
    # 开发环境输出 SQL 到控制台
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置 - 开发环境
jwt:
  secret: ${JWT_SECRET:yswionRCkQglQbB3AlYOwrJ+eo+pR0FciMC5lWVtxWI=}  # ⚠️ 生产环境必须使用环境变量

# 验证码配置 - 开发环境
auth:
  verify-code:
    hash-secret: ${VERIFY_CODE_SECRET:49lnyc8hm2CSgbpZgg1MJt7GVWBT3k4yzBwgetm+0P0=}  # ⚠️ 生产环境必须使用环境变量

# 管理后台安全配置 - 开发环境
admin:
  security:
    # 开发环境可以禁用速率限制
    enable-rate-limit: ${ADMIN_ENABLE_RATE_LIMIT:false}
    enable-login-lock: ${ADMIN_ENABLE_LOGIN_LOCK:false}

# Cookie 配置 - 开发环境
app:
  cookie:
    secure: false  # 开发环境使用HTTP,设为false

