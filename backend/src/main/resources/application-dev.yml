# ====================================================
# 开发环境配置
# ====================================================

# 环境特定的配置值
# 数据库配置
spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ai_api_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123}

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # 邮件配置
  mail:
    host: ${MAIL_HOST:smtp.exmail.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:support@xcoder.plus}
    password: ${MAIL_PASSWORD:od8vgwT878ny7ebn}
    properties:
      mail:
        smtp:
          ssl:
            enable: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
            port: 465
          starttls:
            enable: false
            required: false

# MyBatis Plus 开发环境配置
mybatis-plus:
  configuration:
    # 开发环境输出 SQL 到控制台
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 管理后台安全配置 - 开发环境
admin:
  security:
    # 开发环境可以禁用速率限制
    enable-rate-limit: ${ADMIN_ENABLE_RATE_LIMIT:false}
    enable-login-lock: ${ADMIN_ENABLE_LOGIN_LOCK:false}
