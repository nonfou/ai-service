services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: ai-service-copilot-backend:latest
    container_name: ai-service-copilot-backend
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - SERVER_PORT=8080
      - COPILOT_PROXY_BASE_URL=${COPILOT_PROXY_BASE_URL:-http://host.docker.internal:4141/v1}
      - COPILOT_PROXY_API_KEY=${COPILOT_PROXY_API_KEY:-}
      - COPILOT_PROXY_CONNECT_TIMEOUT_MS=${COPILOT_PROXY_CONNECT_TIMEOUT_MS:-10000}
      - COPILOT_PROXY_READ_TIMEOUT_MS=${COPILOT_PROXY_READ_TIMEOUT_MS:-600000}
      - COPILOT_PROXY_STREAM_TIMEOUT_MS=${COPILOT_PROXY_STREAM_TIMEOUT_MS:-1800000}
      - COPILOT_PROXY_WARMUP_MODEL=${COPILOT_PROXY_WARMUP_MODEL:-claude-haiku-4.5}
      - JAVA_OPTS=${JAVA_OPTS:--Xmx512m -Xms256m}
    volumes:
      - ./logs/backend:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
